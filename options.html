<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TU Guide Options</title>
    <link rel="stylesheet" href="css/screen.css" />
    <script src="js/options.js" defer></script>
  </head>
  <body class="options-page">
    <main class="options" aria-labelledby="options-title">
      <header class="options__header">
        <h1 id="options-title">TU Guide</h1>
      </header>

      <nav class="options__tabs" aria-label="Options sections" role="tablist">
        <button
          id="tab-about"
          type="button"
          class="tab-button"
          data-page="about"
          role="tab"
          aria-selected="true"
          aria-controls="page-about"
        >
          About
        </button>
      </nav>

      <section
        id="page-about"
        class="options__panel"
        role="tabpanel"
        tabindex="0"
        aria-labelledby="tab-about"
      >
        <h2>Change Log</h2>
        <p>Version: <span id="extensionVersion">Loading…</span></p>

        <h3>Updates</h3>
        <p>
          1.0.0: Initial release with context menu first-name/last-name
          directory lookup and Temple campus news popup.
        </p>

        <h3>Feedback</h3>
        <p>
          For suggestions and bug reports, feel free to
          <a
            href="https://www.leonelson.com/contact/"
            target="_blank"
            rel="noopener noreferrer"
            >contact me</a
          >.
        </p>
      </section>
    </main>
  </body>
</html>
